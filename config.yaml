app:
  name: crypto-hfmm
  mode: paper  # backtest | paper | live
market:
  symbol: BTCUSDT
  kline_interval: 1m
  depth_levels: 10
strategy:
  base_spread_bps: 4.0
  min_spread_bps: 2.0
  max_spread_bps: 20.0
  order_size_usdt: 30.0
  quote_refresh_sec: 2.0
  order_ttl_sec: 12
  max_open_orders: 6
  inventory_target: 0.0
  inventory_skew: 0.15
  momentum_weight: 0.2
risk:
  initial_capital: 1000.0
  max_daily_loss: 60.0
  max_order_notional: 50.0
  max_net_position: 0.01
  max_consecutive_losses: 5
  max_slippage_bps: 15.0
  api_failure_threshold: 8
  ws_stale_seconds: 5
  abnormal_vol_multiplier: 4.0
fees:
  maker_fee_bps: 1.0
  taker_fee_bps: 2.5
  rebate_bps: 0.0
backtest:
  csv_path: data/sample_klines.csv
  slippage_bps: 2.0
  latency_ms: 100
